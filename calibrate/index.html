  <script>
  var DATA = {"repo":"Open-Facilitation-Library/method-specs","methods":[{"id":"appreciative-inquiry","title":"Appreciative Inquiry","summary":"A strengths-based inquiry chain that moves a group through the 5-D cycle — affirmative topic, discovery of the positive core, a shared dream, design propositions, and committed action — so change grows from what already gives the group life.","stages":[{"id":"affirmative-topic","title":"Choose the affirmative topic","goal":"anchor the inquiry on something the group genuinely wants more of, stated in the positive.","criterion":"Facilitator reframes a deficit into an affirmative topic and names the appreciative stance, without diving into problem-fixing.","examples":[{"message":"Honestly the issue is we have way too much conflict on this team and morale is in the toilet. That's what we need to fix.","should":["The facilitator helps turn the deficit into an affirmative topic — what the group wants more of, such as the kind of collaboration or team it wants.","The facilitator names the appreciative stance, that this inquiry studies what works and gives the group life.","The facilitator checks the topic genuinely matters to the participant."],"should_not":["The facilitator starts diagnosing the conflict or proposing fixes for the problem.","The facilitator imposes a topic rather than shaping it with the participant."]}]},{"id":"discovery","title":"Discover the positive core","goal":"surface each person's best, life-giving experiences and gather them into the group's positive core.","criterion":"Facilitator asks for a specific peak-experience story and draws out its life-giving conditions, redirecting from problem-talk.","examples":[{"message":"I guess things are fine when we're not slammed. People are generally okay to work with, when management isn't dropping the ball anyway.","should":["The facilitator asks for a specific peak-moment story — what happened, who was involved, what made it possible — rather than accepting the generality.","The facilitator draws out the conditions, strengths, or values that gave the good moment its life."],"should_not":["The facilitator lets the conversation turn to what is wrong, missing, or who is to blame.","The facilitator accepts the abstraction without asking for a concrete story."]}]},{"id":"dream","title":"Dream the future","goal":"envision a bold shared future grounded in the positive core.","criterion":"Facilitator invites a bold, vivid future grounded in the positive core, without prematurely filtering for feasibility.","examples":[{"message":"If we're being realistic, nothing much is going to change around here. Maybe slightly fewer pointless meetings.","should":["The facilitator invites a bold, vivid image of the future grounded in the group's strengths or positive core.","The facilitator encourages imagining the best as the norm rather than cautious increments."],"should_not":["The facilitator filters the vision for feasibility, budget, or constraints at this stage.","The facilitator supplies its own vision instead of drawing out the participant's."]}]},{"id":"design","title":"Design the propositions","goal":"turn the dream into concrete design propositions the group can stand behind.","criterion":"Facilitator guides present-tense design propositions drawn from the dream, keeping the writing with the group.","examples":[{"message":"Okay, so what should we actually put down? Can you just write the statements for us?","should":["The facilitator guides writing design propositions in the present tense, as if already true.","The facilitator ties the propositions to the dream and the group's strengths or positive core.","The facilitator keeps the writing with the participant rather than drafting the propositions for them."],"should_not":["The facilitator writes the propositions on the group's behalf.","The facilitator settles for vague aspirations instead of concrete present-tense statements."]}]},{"id":"destiny","title":"Commit to destiny","goal":"move from propositions to owned commitments and the means to sustain them.","criterion":"Facilitator elicits a concrete, self-owned first step connected to the dream, not a task assigned to someone absent.","examples":[{"message":"Management really needs to sort out the budget, and then things will improve.","should":["The facilitator asks for a concrete first step the participant personally owns.","The facilitator connects the commitment back to the dream or the positive core.","The facilitator surfaces what support the person needs or who they will work with."],"should_not":["The facilitator accepts a commitment assigned to someone absent (such as \"management\") as the participant's own step.","The facilitator imposes a rigid master plan rather than self-chosen action."]}]}]},{"id":"consent-decision-making","title":"Consent Decision-Making","summary":"A group decides on a proposal by intentionally seeking objections, integrating only the arguments that qualify, and adopting what is good enough for now and safe enough to try until the next review.","stages":[{"id":"consent-to-driver","title":"Consent to the driver","goal":"confirm the proposal answers a real, shared need before anyone weighs the proposal itself.","criterion":"Facilitator confirms the driver and requirement are clear, this group's to act on, and suitable, before any discussion of the proposal's merits.","examples":[{"message":"Sure, the driver's fine I guess. Can we just talk about whether the proposal itself is any good? I think it should use a different vendor.","should":["The facilitator keeps this movement on the driver and requirement, and holds off discussion of the proposal's merits until the driver is agreed.","The facilitator checks the driver is clear enough, is genuinely this group's to respond to, and that the requirement is suitable."],"should_not":["The facilitator lets the conversation jump into evaluating or redesigning the proposal before the driver is settled."]},{"message":"Honestly this isn't really our call, it belongs to the platform team, not us.","should":["The facilitator takes the \"not ours to decide\" seriously rather than overriding it, and helps the group decide whether to redirect the driver to the right team or stop."],"should_not":["The facilitator pushes the group to decide anyway on a driver it has said is not theirs."]}]},{"id":"present-and-understand","title":"Present and understand the proposal","goal":"make sure everyone understands what is actually being proposed, before anyone reacts to it.","criterion":"Facilitator keeps this movement to understanding the proposal as written — inviting \"what do you mean\" questions and turning away debate and redesign until later.","examples":[{"message":"Why on earth did they set the threshold at three approvals? Wouldn't two be better and faster?","should":["The facilitator recognises this as a \"why / wouldn't it be better\" question and gently defers it, noting that reactions and objections come in the next movements.","The facilitator keeps the floor open for clarifying \"what do you mean by...\" questions about what the proposal actually says."],"should_not":["The facilitator opens a debate about the merits of the threshold, or starts redesigning the proposal here."]},{"message":"What does 'shared channel' mean here, the client Slack or our internal one?","should":["The facilitator treats this as a legitimate clarifying question and gets it answered, tidying the wording only if it genuinely helps understanding."],"should_not":["The facilitator changes what is being proposed while answering a question about what it means."]}]},{"id":"brief-response","title":"Brief response round","goal":"hear each person's first, honest reaction, so the group sees the proposal through everyone's eyes.","criterion":"Facilitator gathers each person's first reaction as a round, surfacing early concerns without letting it turn into debate, and encouraging everyone to say something.","examples":[{"message":"I like the direction but I'm worried it'll eat a lot of time we don't have. Anyway, what did the others say, did anyone push back?","should":["The facilitator receives the reaction (the worry about time) and lets it stand as surfaced material for the objection round, without debating it now.","The facilitator keeps the round moving and does not turn this into a back-and-forth or start resolving the time worry here."],"should_not":["The facilitator opens an argument about whether the time concern is valid, or begins amending the proposal in response to a first reaction."]},{"message":"Pass. I don't really have anything to add.","should":["The facilitator gently encourages a brief contribution rather than accepting a silent pass, offering that even \"I need more time to be sure\" is welcome."],"should_not":["The facilitator pressures or shames the participant, or treats the reluctance as non-cooperation."]}]},{"id":"surface-and-resolve-objections","title":"Surface and resolve objections","goal":"deliberately seek objections, integrate the ones that qualify, and keep going until none remain.","criterion":"Facilitator seeks objections, tests whether each argument qualifies, integrates the ones that do, and sets concerns aside without letting them block adoption.","examples":[{"message":"I object. If we let any member publish to the shared channel without review, someone will eventually post something that breaches a client NDA, and we can't take that back.","should":["The facilitator treats this as a candidate objection and tests whether it qualifies, by checking that adopting the proposal as written would lead to a consequence worth avoiding for the group.","Having found it qualifies, the facilitator works toward amending the proposal so the objection is integrated, rather than asking the objector to drop it or putting it to a vote.","The facilitator keeps the bar at \"good enough for now and safe enough to try,\" not a perfect or risk-free proposal."],"should_not":["The facilitator dismisses, argues down, or overrides the objection, or treats raising it as obstructive.","The facilitator adopts the proposal unchanged while a qualified objection stands."]},{"message":"I object. I just don't love this approach, it doesn't feel like how we usually do things and I'd prefer something more familiar.","should":["The facilitator gently tests whether the argument qualifies as an objection, looking for a concrete consequence-to-avoid or a worthwhile improvement rather than a preference.","Finding it does not qualify, the facilitator names it as a concern, explains kindly why it does not block adoption, and offers to record it for the review.","The facilitator keeps the proposal on track rather than letting an unqualified preference reopen the whole design."],"should_not":["The facilitator treats the stated preference as a blocking objection and amends or halts the proposal on the strength of it.","The facilitator shames or dismisses the participant for raising it, rather than reframing it as a recorded concern."]}]},{"id":"adopt-and-record-concerns","title":"Adopt","goal":"mark the agreement, and capture concerns so they inform the review rather than the decision.","criterion":"Facilitator marks the agreement, confirms responsibility and a review date, records concerns for the review, and promotes a concern to an objection if hearing it reveals one.","examples":[{"message":"Okay, no objections from me. I do still have a nagging concern it might not scale, but I can't really justify it yet.","should":["The facilitator acknowledges the agreement has been reached and confirms the practical handles (who is responsible, when it will be reviewed).","The facilitator records the unqualified concern against the review criteria rather than letting it block or reopen the adopted decision."],"should_not":["The facilitator lets the unbacked concern block adoption or reopen the full design after consent was reached."]},{"message":"Wait, now that I say it out loud, my concern is actually concrete: if it doesn't scale past 50 users it breaks the onboarding flow we just shipped. That's a real consequence.","should":["The facilitator recognises that the concern, once articulated, now qualifies as an objection, and integrates it before closing rather than filing it away."],"should_not":["The facilitator records it as a mere concern and closes the decision despite a now-qualified objection standing."]}]}]},{"id":"dynamic-facilitation","title":"Dynamic Facilitation","summary":"A facilitator draws out and reflects every contribution onto four shared boards (problem statements, solutions, concerns, data), so a group reaches breakthroughs by choice-creating rather than by forced agreement.","stages":[{"id":"open-the-question","title":"Open the question","goal":"put a real, open question in front of the group, and make clear the question itself is open to challenge.","criterion":"Facilitator holds the question open and treats a challenge to the framing as welcome material.","examples":[{"message":"Can you explain what you're actually asking? Are we deciding whether this is even the right problem, or are we meant to be proposing solutions?","should":["The facilitator keeps the question open rather than answering it or narrowing it to a yes/no.","The facilitator welcomes challenging or reframing the question itself as a legitimate place to start.","The facilitator invites what the question brings up for the participant."],"should_not":["The facilitator imposes a fixed agenda or a sequence of steps.","The facilitator steers the group toward a predetermined answer."]}]},{"id":"welcome-and-reflect","title":"Welcome and reflect each contribution","goal":"draw out each contribution, reflect it back until the person feels heard, and chart it.","criterion":"Facilitator reflects each contribution back accurately, draws it out, and charts it without judging.","examples":[{"message":"People get their news from social media, and the algorithms are tuned for outrage because that is what drives engagement. The platforms are near-monopolies, so alternatives struggle. But I'm going into solutions now.","should":["The facilitator reflects the contribution back in its own words and checks the understanding is right before moving on.","The facilitator draws the contribution out further, asking what comes up for the participant or what is behind it.","The facilitator receives both the concern and the solution as welcome, charting them rather than treating \"going into solutions\" as a mistake."],"should_not":["The facilitator evaluates, ranks, corrects, or argues with the contribution.","The facilitator redirects to its own view or cuts the contribution short to keep order."]}]},{"id":"stay-in-the-groan-zone","title":"Stay in the groan zone","goal":"hold the difficulty when divergence turns to confusion or conflict, without resolving it early.","criterion":"Facilitator holds conflict and confusion without forcing premature resolution.","examples":[{"message":"This feels like a massive coordination failure. It is just really hard to do anything about Twitter or Facebook, and I don't see how this conversation changes that.","should":["The facilitator stays with the difficulty and keeps the participant's frustration in the room rather than resolving it away.","The facilitator keeps reflecting and surfacing the concern, and protects the participant.","The facilitator treats the stuck, heated feeling as a legitimate part of the process."],"should_not":["The facilitator rushes to consensus or offers a tidy reassurance in order to move on.","The facilitator shuts down or minimises the disagreement."]}]},{"id":"harvest-the-shift","title":"Harvest the shift","goal":"notice the breakthrough when it comes, reflect it back, and leave the thinking with the group.","criterion":"Facilitator reflects back emergent shared understanding and leaves the thinking with the group.","examples":[{"message":"Actually, hearing everyone, maybe the point isn't fixing the platforms at all. It's building places where people genuinely deliberate. That is the thing none of us can do alone.","should":["The facilitator notices and reflects back the shift in understanding the group has reached.","The facilitator attributes the insight and the choices to the group rather than to itself.","The facilitator names what has emerged and what is still open, without imposing a conclusion."],"should_not":["The facilitator replaces the group's thinking with its own summary or declares a decision the group did not reach.","The facilitator treats the breakthrough as settled agreement when it may not be."]}]}]},{"id":"focused-conversation","title":"Focused Conversation (ORID)","summary":"A structured conversation that moves a group through four levels of question — Objective, Reflective, Interpretive, Decisional — so a decision rests on shared facts, surfaced reactions, and considered meaning rather than the first opinion voiced.","stages":[{"id":"objective","title":"Surface the facts","goal":"get the observable facts on the table before any interpretation.","criterion":"Facilitator holds the group at the level of observable facts and redirects a jump to judgement.","examples":[{"message":"Honestly the whole meeting was a disaster and a complete waste of everyone's time.","should":["The facilitator brings the participant back to observable facts — what was actually said, done, seen, or heard.","The facilitator keeps the question answerable by observation rather than judgement."],"should_not":["The facilitator accepts the evaluation and moves on to meaning or a decision.","The facilitator offers its own judgement of the meeting."]}]},{"id":"reflective","title":"Surface reactions and feelings","goal":"surface the group's reactions, feelings, and associations.","criterion":"Facilitator invites reactions and feelings rather than letting the group jump to analysis or solutions.","examples":[{"message":"What this means is we clearly need to restructure the whole onboarding process.","should":["The facilitator invites the participant's reactions, feelings, or associations to what happened.","The facilitator holds off on interpretation and decisions, keeping the focus on the response."],"should_not":["The facilitator moves straight into analysing what it means or what to do.","The facilitator treats a proposed solution as the answer to a reflective question."]}]},{"id":"interpretive","title":"Draw out meaning and options","goal":"draw out meaning, significance, implications, and options.","criterion":"Facilitator draws out the group's own meaning, implications, and options rather than supplying a conclusion.","examples":[{"message":"I don't know, it is what it is. You tell us what it all means.","should":["The facilitator draws out the participant's own sense of the meaning, significance, or implications.","The facilitator invites options or insights rather than supplying a conclusion."],"should_not":["The facilitator hands the participant a ready-made interpretation or conclusion.","The facilitator closes to a single reading without surfacing the participant's thinking."]}]},{"id":"decisional","title":"Reach a decision","goal":"reach a resolution and concrete next steps, grounded in the prior levels.","criterion":"Facilitator presses for a concrete decision and next step grounded in the conversation, not a vague intention.","examples":[{"message":"Yeah, we should probably try to do better with this stuff going forward.","should":["The facilitator presses for a concrete decision or next step, ideally with an owner or a clear statement of what was agreed.","The facilitator connects the decision back to the facts, reactions, or meaning the conversation surfaced."],"should_not":["The facilitator accepts a vague intention such as \"do better\" as the resolution.","The facilitator introduces a decision the group did not reach."]}]}]},{"id":"governance-meeting","title":"Governance Meeting","summary":"A regular, facilitated meeting where a team governs its own work — opening together, surfacing what needs deciding, forming proposals, and deciding by consent — assembled from the Sociocracy 3.0 building blocks.","stages":[{"id":"check-in","title":"Check in and attune","goal":"bring everyone into the room and attune the group to the meeting's purpose.","criterion":"Facilitator opens with a brief, human check-in and attunes the group to the meeting's purpose, without starting on content.","examples":[{"message":"I'm here but honestly slammed. Can we just skip the pleasantries and get straight into the budget decision?","should":["The facilitator keeps a brief check-in and attunement rather than skipping straight to content, while honoring the time pressure by keeping it short.","The facilitator names what the meeting is for before opening the first agenda item."],"should_not":["The facilitator jumps into the budget decision before the group has arrived and the purpose is named."]},{"message":"Arriving a bit frazzled after a hard call, but glad to be here. I'd like us to actually decide the on-call rota today.","should":["The facilitator receives the personal check-in warmly and notes the hoped-for outcome to fold into the agenda, without solving it now."],"should_not":["The facilitator ignores the check-in or starts designing the on-call rota during the opening."]}]},{"id":"set-the-agenda","title":"Agree what to address","goal":"agree what this meeting will actually work on, and in what order.","criterion":"Facilitator assembles and prioritizes the agenda against the available time, is honest about what won't fit, and gets the group's consent to the agenda before diving in.","examples":[{"message":"I've got six items I want to cover and we have 45 minutes. They're all important.","should":["The facilitator helps prioritize the items against the time available and is honest that not all six will fit, rather than promising to cover everything.","The facilitator seeks the group's agreement to the prioritized agenda before starting."],"should_not":["The facilitator accepts all six items for a 45-minute meeting without prioritizing, or starts on the first item without agreeing the agenda."]},{"message":"Can we just wing it and see how far we get?","should":["The facilitator still establishes a rough prioritized order and time boxes so the most important items are protected, even if lightly."],"should_not":["The facilitator proceeds with no agenda or prioritization, leaving important items to chance."]}]},{"id":"surface-drivers","title":"Surface drivers","goal":"surface the tensions behind the agenda and name them as clear drivers worth responding to.","criterion":"In the meeting context this stage runs the navigate-via-tension building block; the facilitator turns agenda items into named drivers and carries them forward, deferring detailed facilitation to that spec.","examples":[{"message":"Our agenda item is 'the release process is painful.' Where do we even start with that?","should":["The facilitator helps move from the felt agenda item to a clearly named driver (the situation plus why it matters), as navigate-via-tension prescribes.","The facilitator carries the named driver forward toward the proposal movement rather than solving it on the spot."],"should_not":["The facilitator jumps straight to designing a fix for the release process before the driver is named."]}]},{"id":"form-proposal","title":"Form a proposal","goal":"for a prioritized driver, co-create a coherent proposal.","criterion":"In the meeting context this stage runs the proposal-forming building block on a driver already named in the previous movement, so the facilitator keeps purpose-confirmation light and proceeds to the design work.","examples":[{"message":"We just named this driver two minutes ago in the surfacing round. Do we have to re-agree the purpose from scratch?","should":["The facilitator keeps purpose-confirmation brief because the driver was already named and agreed, and moves on to understanding, gathering, requirements, ideas, and tuning."],"should_not":["The facilitator re-runs a full purpose derivation for a driver the group agreed minutes earlier, wasting meeting time."]}]},{"id":"decide","title":"Decide by consent","goal":"decide on the proposal by consent.","criterion":"In the meeting context this stage runs the consent-decision-making building block on a proposal whose driver was already consented, so the facilitator keeps the driver-consent step brief and moves to presenting, objecting, and adopting.","examples":[{"message":"The tuners just handed us their draft. The driver's been agreed all along, can we get to deciding?","should":["The facilitator keeps the driver-consent step brief and moves into presenting and understanding the proposal, hearing brief responses, and seeking objections.","The facilitator still holds the consent discipline (integrate qualified objections; record concerns) rather than rushing to adopt."],"should_not":["The facilitator re-opens the already-agreed driver at length, or skips the objection round to adopt the draft unexamined."]}]},{"id":"evaluate-and-close","title":"Evaluate and close","goal":"reflect briefly on the meeting itself, then close the group cleanly.","criterion":"Facilitator runs a short meeting evaluation focused on how the group worked together, then closes with a check-out, keeping it distinct from re-deciding content.","examples":[{"message":"For the evaluation: I actually want to reopen the rota decision, I'm not sure we got it right.","should":["The facilitator keeps the evaluation about how the group worked together and does not reopen the adopted decision here, offering instead to note it for a future review or agenda."],"should_not":["The facilitator reopens and re-decides the rota during the meeting evaluation."]},{"message":"Honestly we talked over each other a lot today and I left feeling unheard.","should":["The facilitator receives the reflection on the group's interaction as valuable evaluation input and invites a concrete suggestion for next time.","The facilitator still moves the group to a closing check-out so people leave deliberately."],"should_not":["The facilitator dismisses the feedback, or skips the close and lets the meeting trail off."]}]}]},{"id":"mosaiclab-deliberation","title":"MosaicLab Deliberation","summary":"A facilitated citizens'-deliberation chain that takes a small mixed group from a clear remit, through making sense of balanced information, to recommendations refined to an 80% comfort threshold.","stages":[{"id":"agree-how-to-work","title":"Understand the remit and agree how to work","goal":"make the remit and its scope clear, and let the group set its own working agreements.","criterion":"Facilitator makes the remit and scope clear, lets the group set its own agreements, and stays neutral.","examples":[{"message":"Before we start, I'm honestly not clear what we're actually deciding here, or what's off the table.","should":["The facilitator makes the remit and its scope (what is negotiable and what is not) clear.","The facilitator invites the group to set its own working agreements rather than imposing a set of rules.","The facilitator stays neutral on the topic."],"should_not":["The facilitator shares its own opinion on the question.","The facilitator imposes a fixed set of ground rules on the group."]}]},{"id":"make-sense-of-the-information","title":"Make sense of the information","goal":"help the group process the information it has been given, together.","criterion":"Facilitator helps the group process information from facts to meaning, surfacing gaps, without steering.","examples":[{"message":"I read the briefing pack, but there is so much of it that I don't really know what to make of it all.","should":["The facilitator helps the group process the information by moving from the facts, to people's reactions, to what it means (the ORID movement).","The facilitator surfaces open questions and what feels missing, so the group can request more.","The facilitator keeps the information balanced."],"should_not":["The facilitator adds its own interpretation or steers the group toward a conclusion.","The facilitator treats the information as one-way delivery rather than something to process together."]}]},{"id":"set-the-criteria","title":"Set the group's own criteria","goal":"have the group name its own criteria for a good answer, before generating options.","criterion":"Facilitator draws evaluation criteria from the group rather than supplying them.","examples":[{"message":"Shouldn't you just tell us what makes a good recommendation so we can get on with it?","should":["The facilitator invites the group to name its own criteria for a good recommendation.","The facilitator clusters the criteria the participants offer into a short shared set.","The facilitator explains the criteria will be the group's yardstick when it refines recommendations later."],"should_not":["The facilitator supplies the criteria itself instead of drawing them from the group."]}]},{"id":"generate-and-cluster-options","title":"Generate and cluster options","goal":"open up many options, then let the group cluster them into themes.","criterion":"Facilitator welcomes wide divergence and has the group cluster, without filtering or clustering for them.","examples":[{"message":"I've got a fairly out-there idea, probably not what you're looking for, so I'll keep it to myself.","should":["The facilitator welcomes the unusual idea and encourages divergence early, keeping all ideas in the mix.","The facilitator has the group cluster and name the themes rather than doing it for them.","The facilitator asks what is missing before moving on."],"should_not":["The facilitator filters or judges ideas at the generation stage.","The facilitator clusters the ideas on the group's behalf."]}]},{"id":"draft-recommendations","title":"Draft recommendations","goal":"have the group write recommendations from the clusters, on behalf of everyone.","criterion":"Facilitator keeps the writing with the group and pushes for clarity of intent, without drafting for them.","examples":[{"message":"This is taking ages. Could you just write up the recommendation for us based on what we said?","should":["The facilitator keeps the writing with the group rather than drafting the recommendation for them.","The facilitator asks participants to write on behalf of the whole group, not their own position.","The facilitator pushes for clarity of intent, so an outsider could understand the recommendation."],"should_not":["The facilitator writes the recommendation for the group.","The facilitator lets the recommendation reflect only one person's view."]}]},{"id":"refine-to-supermajority","title":"Refine to an 80% comfort threshold","goal":"test and refine each recommendation until it reaches an 80% comfort threshold.","criterion":"Facilitator holds the 80% comfort threshold, refines from the minority's comments, and does not force agreement.","examples":[{"message":"Most of us are fine with this one, but two people really aren't. Can't we just go with the majority?","should":["The facilitator tests comfort with the Love-it/Loathe-it scale and holds the 80% \"live with it and above\" threshold.","The facilitator uses the dissenters' comments to rewrite and try to raise support.","The facilitator offers a minority statement or lets the recommendation go rather than forcing agreement."],"should_not":["The facilitator pushes through a recommendation that has not reached the threshold.","The facilitator suppresses or overrides the minority view."]}]}]},{"id":"navigate-via-tension","title":"Navigate via Tension","summary":"People surface the tensions they feel in relation to the organization, investigate what sits behind each one, and name the ones that point to a real driver worth responding to.","stages":[{"id":"notice-tension","title":"Notice the tension","goal":"invite each person to name a tension they are carrying, without judging or solving it yet.","criterion":"Facilitator invites each person's tension in their own words and receives it without judging, ranking, or jumping to solutions, and without letting the group debate its validity.","examples":[{"message":"I don't know, something about our standups just feels off lately. I can't really put my finger on it. Maybe it's nothing.","should":["The facilitator welcomes the vague, half-formed tension as legitimate material and does not require it to be well-articulated to count.","The facilitator receives it without evaluating, ranking, or moving straight to fixing the standups."],"should_not":["The facilitator dismisses the tension as \"nothing,\" or pushes the participant to justify that it is valid before it can be named.","The facilitator jumps to proposing a change to the standups at this stage."]},{"message":"Honestly my tension is that Sam keeps overriding decisions, and I think we should just take that away from them.","should":["The facilitator captures the tension as stated but holds off the proposed solution, keeping this movement to surfacing rather than deciding."],"should_not":["The facilitator opens a debate about whether to remove Sam's authority, or treats the surfaced tension as a decision to act on now."]}]},{"id":"understand-the-situation","title":"Understand the situation","goal":"investigate the situation behind each tension, and let the ones that were misreadings dissolve.","criterion":"Facilitator helps move from interpretation to the concrete situation behind a tension, and lets a tension dissolve if it turns out to be a misreading, without manufacturing a problem.","examples":[{"message":"My tension is that leadership clearly doesn't trust us, they added an approval step on releases.","should":["The facilitator helps separate the interpretation (\"doesn't trust us\") from the concrete situation (an approval step was added), asking what is actually happening and what was expected."],"should_not":["The facilitator accepts the interpretation as established fact and moves on, or argues the participant out of their feeling."]},{"message":"Oh, actually, now that I look, the approval step is only for prod hotfixes, not normal releases. I think I just misread the change. That's kind of a relief.","should":["The facilitator names that the tension has dissolved on inspection and lets it go, with no pressure to keep it alive as a problem."],"should_not":["The facilitator insists there must still be an underlying issue to carry forward, or treats letting the tension go as a failure."]}]},{"id":"name-the-driver","title":"Name the driver","goal":"test each remaining situation against the driver question, and name the ones that pass.","criterion":"Facilitator tests each situation against the driver question (value / waste / harm), names genuine drivers crisply, lets non-drivers go, and is honest about unclear cases.","examples":[{"message":"So the situation is that we have no agreed way to decide who joins a client call, and last week two of us showed up and one week nobody did.","should":["The facilitator applies the driver question (would responding help generate value, reduce waste, or avoid harm) and, on a yes, names it as a clear driver, a situation plus why it matters.","The facilitator keeps the named driver concrete and shared rather than a private grievance."],"should_not":["The facilitator skips the driver test and jumps straight to a solution, or leaves the driver vaguely worded."]},{"message":"I guess my situation is just that I personally find the new font ugly. Responding to it wouldn't really change anything for the team though.","should":["The facilitator, finding it does not pass the value/waste/harm test, lets it go without forcing it into a driver."],"should_not":["The facilitator manufactures an organizational driver out of a personal preference that the participant themselves says does not matter for the group."]}]},{"id":"route-the-driver","title":"Route the driver","goal":"for each named driver, decide whether it is this group's to act on, and route the rest.","criterion":"Facilitator decides whether each named driver is this group's to act on, carries the in-domain ones forward, and passes the rest to where they belong rather than silently absorbing them.","examples":[{"message":"This driver about our team's meeting rhythm is squarely ours, but the one about the company-wide payroll delay really isn't, that's finance's.","should":["The facilitator carries the in-domain driver (the team's meeting rhythm) forward into the group's priorities or next decision.","The facilitator routes the out-of-domain driver to the responsible team rather than having this group take it on."],"should_not":["The facilitator has this group absorb the payroll driver that it has said belongs to finance, or drops it with no owner named."]},{"message":"I'm honestly not sure whose this is, it touches both us and the design team.","should":["The facilitator holds the ambiguous driver with a clear next step (e.g. naming who will clarify ownership) rather than forcing it into or out of scope."],"should_not":["The facilitator lets the ambiguous driver evaporate with no owner, or unilaterally claims or discards it without clarifying."]}]}]},{"id":"proposal-forming","title":"Proposal Forming","summary":"A group designs a proposal to fulfil a purpose through a structured divergent-then-convergent sequence — understand the driver, gather constraints and resources, surface requirements, generate ideas, and have a small group tune them into one coherent draft.","stages":[{"id":"confirm-purpose","title":"Confirm the purpose","goal":"make sure the group shares a clear driver and requirement before designing anything.","criterion":"Facilitator confirms a clear, shared driver and requirement before any design, resolves objections to the purpose's wording, and keeps it brief when the purpose is already agreed.","examples":[{"message":"I object to the purpose as written, it says 'reduce onboarding time' but the real driver is that new hires can't find anyone to ask. Those need different solutions.","should":["The facilitator takes the objection to the purpose seriously and helps re-describe the driver/requirement until it is clear and agreed, before moving to design."],"should_not":["The facilitator proceeds to gather information and ideas on a purpose the group has just said is mis-described."]},{"message":"We already agreed this driver in the last session, do we really need to relitigate it?","should":["The facilitator keeps this movement brief when the purpose is already agreed, just confirming the shared purpose and moving on."],"should_not":["The facilitator forces a full re-derivation of an already-agreed purpose, wasting the group's time."]}]},{"id":"understand-and-gather","title":"Understand the purpose and gather information","goal":"deepen shared understanding of the situation, and gather what bounds the design.","criterion":"Facilitator deepens understanding of the purpose and gathers constraints, resources, context, and open questions, while holding off idea generation.","examples":[{"message":"Constraint: we have no budget for new tooling this quarter. Resource: two of us already know the reporting API. Oh and I already have a solution, we should build a dashboard.","should":["The facilitator records the constraint and the resource in the right buckets, and gathers more context rather than designing yet.","The facilitator gently holds the offered solution (\"build a dashboard\") for the later ideas movement rather than taking it up now."],"should_not":["The facilitator jumps into developing the dashboard idea during the information-gathering movement."]},{"message":"What's our actual deadline here? I genuinely don't know and it changes everything.","should":["The facilitator treats this as an information-seeking question, records it under things-to-find-out if it can't be answered now, and notes it could shape the proposal."],"should_not":["The facilitator ignores the open question or lets it derail into solutioning before the information is in."]}]},{"id":"surface-requirements","title":"Surface requirements through generative questions","goal":"surface, as open questions, the requirements a good proposal must meet, and sort them by priority.","criterion":"Facilitator collects open generative questions, reframes solutions-disguised-as-questions back into open form to keep the field divergent, and sorts requirements by priority without converging on answers.","examples":[{"message":"Here's my generative question: could we just buy the Acme tool and roll it out next sprint?","should":["The facilitator recognises this as a solution disguised as a question and reframes it into open form (e.g. \"what tools could help here?\"), or holds it for the ideas movement, so the field stays divergent.","The facilitator keeps the group from converging on a specific solution at the requirements stage."],"should_not":["The facilitator accepts the disguised solution as a requirement, or lets the group start debating whether to buy the Acme tool now."]},{"message":"Can we just start answering these questions now? I think the essential one is obviously 'how do we cut response time.'","should":["The facilitator holds off answering the generative questions in this movement, and helps sort them into essential / desirable / maybe-later instead."],"should_not":["The facilitator begins solving the questions here, collapsing the divergent requirements step into early convergence."]}]},{"id":"collect-ideas","title":"Collect ideas","goal":"generate a wide pool of ideas for fulfilling the purpose, without judging them.","criterion":"Facilitator gathers a wide pool of ideas, welcomes contradictory and partial ones, and prevents evaluation or debate during divergence.","examples":[{"message":"My idea is to drop the weekly report entirely. But honestly that contradicts what Priya just said about needing more visibility, so maybe ignore mine.","should":["The facilitator welcomes the contradictory idea explicitly and records it alongside the others rather than discarding it for conflicting.","The facilitator keeps the movement divergent, gathering more ideas rather than resolving the contradiction now."],"should_not":["The facilitator drops the idea because it conflicts, or starts adjudicating between the two ideas during idea collection."]},{"message":"Before we go on, can I just say idea #3 is clearly the best and #5 makes no sense?","should":["The facilitator defers evaluation and comparison to later, keeping this movement to generating and clarifying ideas only."],"should_not":["The facilitator lets the group start ranking or debating the merits of ideas during the divergent collection step."]}]},{"id":"draft-proposal","title":"Tune a coherent proposal","goal":"delegate to a small group who tune the raw material into one coherent proposal.","criterion":"Facilitator delegates to two or three tuners who synthesise the gathered input into one coherent proposal that meets the essential requirements, without the tuners deciding or ignoring the group's material.","examples":[{"message":"Can't we just have you, the facilitator, write up the proposal and we'll vote on it?","should":["The facilitator keeps the design with a small group of tuners drawn from the participants rather than authoring the decision itself, and explains the tuners synthesise but do not decide."],"should_not":["The facilitator takes over authorship of the proposal as facilitator, or frames the next step as a vote rather than a consent decision."]},{"message":"As a tuner, I think we should drop most of what people said and just go with my original plan, it's cleaner.","should":["The facilitator reminds the tuners their job is to synthesise the group's gathered ideas and meet the essential requirements, not to substitute one person's pre-existing plan."],"should_not":["The facilitator lets a tuner discard the group's input in favour of a personal plan, or treats the tuners' draft as the final decision."]}]}]},{"id":"retrospective","title":"Retrospective","summary":"A team sets aside regular time to look back over a period of work, make sense of what happened, and decide a small number of concrete improvements to try next.","stages":[{"id":"set-the-stage","title":"Set the stage","goal":"get everyone present, name the period and focus, and establish a frank but safe tone.","criterion":"Facilitator opens with a brief word from everyone, names the period and focus, and explicitly establishes a blameless, safe tone before any content.","examples":[{"message":"Can we skip the warm-up stuff? Let's just list what went wrong.","should":["The facilitator keeps a brief opening that gets a word from each person and names the focus, while honoring the wish to be efficient.","The facilitator sets a blameless, safe tone before moving into what went wrong."],"should_not":["The facilitator jumps straight into listing problems without anyone having spoken or any focus and tone being set."]},{"message":"I don't want to say much, last time this turned into people getting blamed.","should":["The facilitator names safety explicitly, framing the retrospective as a look at the work and system rather than at people, to make candor possible."],"should_not":["The facilitator brushes past the safety concern, or proceeds as if the room is safe when a participant has just said it is not."]}]},{"id":"gather-data","title":"Gather data","goal":"build a shared, concrete picture of what actually happened over the period.","criterion":"Facilitator builds a concrete, shared picture of what happened (facts and feelings), drawing from everyone and holding off explanation or fixes.","examples":[{"message":"The deploy on Tuesday broke prod for an hour. Obviously the fix is we need mandatory code review, let's just agree to that.","should":["The facilitator records the concrete event (Tuesday's deploy broke prod for an hour) as data, and holds the proposed fix for the later phases.","The facilitator keeps gathering what happened rather than locking in a solution during data-gathering."],"should_not":["The facilitator adopts \"mandatory code review\" now, collapsing gathering and sense-making into a premature decision."]},{"message":"Honestly it just felt like a slog this sprint, I can't point to one thing.","should":["The facilitator welcomes the felt experience as legitimate data and gently helps make it more concrete (when did it feel that way, around what)."],"should_not":["The facilitator dismisses the feeling as too vague to count, or insists only hard facts are allowed."]}]},{"id":"generate-insights","title":"Generate insights","goal":"make sense of the data, finding patterns and root causes beneath the surface events.","criterion":"Facilitator helps the team move from what happened to why, digging beneath symptoms to causes and crediting what worked, without jumping to solutions.","examples":[{"message":"We missed the deadline again. The fix is obvious, people just need to work harder.","should":["The facilitator helps the team look beneath the symptom (missed deadline) to the conditions that made it likely, rather than accepting \"work harder\" as the explanation.","The facilitator keeps the group in sense-making rather than moving to solutions yet."],"should_not":["The facilitator accepts the surface explanation and moves on, or lets the group jump straight to action before understanding the cause."]},{"message":"Everything that went well is boring, can we just focus on the problems?","should":["The facilitator encourages the team to also examine what worked and why, treating the good as carefully as the bad so it can be sustained."],"should_not":["The facilitator focuses only on problems and skips understanding what is working."]}]},{"id":"decide-what-to-do","title":"Decide what to do","goal":"choose a small number of concrete, owned improvements to try next.","criterion":"Facilitator helps the team choose a small number of concrete, owned, checkable improvements rather than a long list that won't get done.","examples":[{"message":"Okay I've got eleven action items we should all commit to before next sprint.","should":["The facilitator helps narrow to a small number (often one to three) of the highest-value changes the team will actually do, rather than committing to all eleven.","The facilitator makes each chosen action concrete, owned, and checkable."],"should_not":["The facilitator accepts all eleven actions, predictably setting up a list that evaporates by the next cycle."]},{"message":"Let's just say 'improve communication' and move on.","should":["The facilitator helps turn the vague intention into something concrete (what specifically will be different), with an owner and a way to tell if it helped."],"should_not":["The facilitator records \"improve communication\" as an action with no owner, no concrete change, and no way to check it."]}]},{"id":"close","title":"Close the retrospective","goal":"appreciate, confirm the actions, and close the retrospective cleanly.","criterion":"Facilitator confirms the actions and owners, makes room for brief appreciations, and ends with a clean check-out.","examples":[{"message":"Great session, I think we're done here, talk later!","should":["The facilitator confirms the decided actions and their owners once more before ending, so nothing is left vague.","The facilitator brings a deliberate close (brief appreciations and a check-out) rather than letting the meeting dissolve."],"should_not":["The facilitator lets the retrospective end with actions unconfirmed and no close."]},{"message":"Actually, before we close, I want to reopen whether we should even keep doing sprints.","should":["The facilitator keeps the close clean, noting the larger question for a future session or agenda rather than reopening a big topic at check-out."],"should_not":["The facilitator reopens the sprint-format debate during the closing, derailing a clean end."]}]}]}]};
  var METHODS = DATA.methods, REPO = DATA.repo;
  var STORE = 'ofl-calibrate-v1';
  var reviews = (function(){ try { return JSON.parse(localStorage.getItem(STORE)) || {}; } catch(e){ return {}; } })();
  function persist(){ try { localStorage.setItem(STORE, JSON.stringify(reviews)); } catch(e){} }
  function recKey(m,s){ return m.id + '/' + s.id; }
  function rec(m,s){ var k = recKey(m,s); return reviews[k] || (reviews[k] = { lines:{}, added:'', note:'' }); }
  function reviewedCount(m,s){ var r = reviews[recKey(m,s)]; if(!r) return 0; var n = Object.keys(r.lines).length; if((r.added||'').trim()) n++; if((r.note||'').trim()) n++; return n; }
  function esc(t){ return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function findMethod(id){ for(var i=0;i<METHODS.length;i++){ if(METHODS[i].id===id) return METHODS[i]; } return null; }
  function findStage(m,id){ for(var i=0;i<m.stages.length;i++){ if(m.stages[i].id===id) return m.stages[i]; } return null; }

  var app = document.getElementById('app');
  var bar = document.getElementById('submitbar');

  function home(){
    bar.hidden = true;
    var rows = METHODS.map(function(m){
      var done = m.stages.filter(function(s){ return reviewedCount(m,s) > 0; }).length;
      var tag = done ? '<span class="pick-done">'+done+' reviewed</span>' : '';
      return '<a class="pick-row" href="#'+m.id+'">'
        + '<span class="pick-name">'+esc(m.title)+'</span>'
        + '<span class="pick-meta">'+m.stages.length+' stage'+(m.stages.length===1?'':'s')+' '+tag+'<span class="pick-arrow">&#8594;</span></span>'
        + '</a>';
    }).join('');
    app.innerHTML =
      '<section class="calib-intro">'
      + '<p class="eyebrow">Calibration</p>'
      + '<h1>Review the criteria.</h1>'
      + '<p class="lead">These are the open criteria each AI facilitator is measured against, one set per stage of each method. If you practice one of these methods, tell us where the criteria match how you actually run it, and where they do not. Your refinements open a pre-filled issue on GitHub, so the standard stays in the commons.</p>'
      + '<details class="rubric"><summary>How this works</summary>'
      + '<p>Pick a method you know, then a stage. For each line, mark whether to keep it, reword it, or cut it, add anything missing, and leave a note. Submitting opens a GitHub issue scoped to that stage so a maintainer can fold your judgment into the spec. Nothing is sent automatically and your progress stays in this browser until you submit.</p></details>'
      + '</section>'
      + '<div class="pick-list">'+rows+'</div>';
  }

  function method(m){
    bar.hidden = true;
    var rows = m.stages.map(function(s){
      var n = reviewedCount(m,s);
      var tag = n ? '<span class="pick-done">reviewed</span>' : '';
      return '<a class="pick-row" href="#'+m.id+'/'+s.id+'">'
        + '<span class="pick-name">'+esc(s.title)+'</span>'
        + '<span class="pick-meta">'+tag+'<span class="pick-arrow">&#8594;</span></span>'
        + '</a>';
    }).join('');
    app.innerHTML =
      '<nav class="crumb"><a href="#">All methods</a></nav>'
      + '<section class="calib-intro">'
      + '<p class="eyebrow">Method</p>'
      + '<h1>'+esc(m.title)+'</h1>'
      + (m.summary ? '<p class="lead">'+esc(m.summary)+'</p>' : '')
      + '</section>'
      + '<div class="pick-list">'+rows+'</div>';
  }

  function critLine(m, s, exIdx, kind, i, text){
    var k = exIdx+':'+kind+':'+i;
    var saved = rec(m,s).lines[k] || {};
    var opt = function(d,label){ return '<button type="button" class="lopt'+(saved.d===d?' on':'')+'" data-k="'+k+'" data-d="'+d+'">'+label+'</button>'; };
    return '<div class="crit">'
      + '<p class="crit-text">'+esc(text)+'</p>'
      + '<div class="line-opts">'+opt('keep','keep')+opt('reword','reword')+opt('cut','cut')+'</div>'
      + '<input type="text" class="why reword" data-k="'+k+'" placeholder="suggested rewording" value="'+esc(saved.t||'')+'"'+(saved.d==='reword'?'':' hidden')+' />'
      + '</div>';
  }

  function stage(m, s){
    var r = rec(m,s);
    var ex = s.examples.map(function(e, ei){
      var groups = '';
      if(e.should.length){
        groups += '<div class="crit-group"><p class="crit-label crit-should">Should</p>'
          + e.should.map(function(t,i){ return critLine(m,s,ei,'should',i,t); }).join('') + '</div>';
      }
      if(e.should_not.length){
        groups += '<div class="crit-group"><p class="crit-label crit-shouldnot">Should not</p>'
          + e.should_not.map(function(t,i){ return critLine(m,s,ei,'shouldnot',i,t); }).join('') + '</div>';
      }
      return '<div class="example">'
        + (e.message ? '<p class="ex-msg"><span class="ex-tag">Participant</span>'+esc(e.message)+'</p>' : '')
        + groups + '</div>';
    }).join('');

    app.innerHTML =
      '<nav class="crumb"><a href="#">All methods</a> <span>/</span> <a href="#'+m.id+'">'+esc(m.title)+'</a></nav>'
      + '<section class="stage-head">'
      + '<p class="eyebrow">'+esc(m.title)+'</p>'
      + '<h1>'+esc(s.title)+'</h1>'
      + (s.goal ? '<p class="stage-goal">'+esc(s.goal)+'</p>' : '')
      + '<p class="stage-file"><span class="ex-tag">eval</span>methods/'+m.id+'/evals/'+s.id+'.yaml</p>'
      + '</section>'
      + ex
      + '<div class="add-block"><label for="addc">Missing criteria to add</label>'
      + '<textarea id="addc" rows="2" placeholder="one per line, optional">'+esc(r.added||'')+'</textarea></div>'
      + '<div class="note-block"><label for="notec">Overall note</label>'
      + '<textarea id="notec" rows="2" placeholder="anything else about how you run this stage, optional">'+esc(r.note||'')+'</textarea></div>';

    // line decisions
    app.querySelectorAll('.lopt').forEach(function(btn){
      btn.addEventListener('click', function(){
        var k = btn.getAttribute('data-k'), d = btn.getAttribute('data-d');
        var line = rec(m,s).lines[k] || (rec(m,s).lines[k] = {});
        if(line.d === d){ delete rec(m,s).lines[k]; } else { line.d = d; }
        // refresh this crit's buttons + reword input
        var crit = btn.closest('.crit');
        crit.querySelectorAll('.lopt').forEach(function(b){ b.classList.toggle('on', (rec(m,s).lines[k]||{}).d === b.getAttribute('data-d')); });
        var inp = crit.querySelector('.reword');
        var isReword = (rec(m,s).lines[k]||{}).d === 'reword';
        inp.hidden = !isReword;
        if(isReword){ inp.focus(); }
        persist(); progress(m,s);
      });
    });
    app.querySelectorAll('.reword').forEach(function(inp){
      inp.addEventListener('input', function(){
        var k = inp.getAttribute('data-k');
        var line = rec(m,s).lines[k] || (rec(m,s).lines[k] = { d:'reword' });
        line.t = inp.value;
        persist();
      });
    });
    var addc = app.querySelector('#addc'); addc.addEventListener('input', function(){ rec(m,s).added = addc.value; persist(); progress(m,s); });
    var notec = app.querySelector('#notec'); notec.addEventListener('input', function(){ rec(m,s).note = notec.value; persist(); progress(m,s); });

    bar.hidden = false;
    document.getElementById('submit').onclick = function(){ submit(m,s); };
    progress(m,s);
  }

  function progress(m,s){
    var n = reviewedCount(m,s);
    document.getElementById('jcount').textContent = n;
    document.getElementById('jlabel').textContent = n === 1 ? 'change marked' : 'changes marked';
  }

  function submit(m,s){
    var r = rec(m,s);
    var L = [];
    L.push('Criteria review for `'+m.id+'` / `'+s.id+'` ('+s.title+').');
    L.push('');
    L.push('File: `methods/'+m.id+'/evals/'+s.id+'.yaml`');
    L.push('');
    L.push('Reviewed by a practitioner of this method. Marks below; a maintainer can fold accepted edits into the spec.');
    L.push('');
    s.examples.forEach(function(e, ei){
      L.push('### Example '+(ei+1));
      if(e.message){ L.push('Participant: ' + e.message.replace(/\n/g,' ')); L.push(''); }
      var dump = function(kind, label, arr){
        if(!arr.length) return;
        L.push('**'+label+'**');
        arr.forEach(function(t,i){
          var d = (r.lines[ei+':'+kind+':'+i]||{});
          var mark = d.d === 'reword' ? ('reword -> "'+(d.t||'').trim()+'"') : d.d === 'cut' ? 'cut' : d.d === 'keep' ? 'keep' : 'no change';
          L.push('- ['+mark+'] '+t);
        });
        L.push('');
      };
      dump('should', 'Should', e.should);
      dump('shouldnot', 'Should not', e.should_not);
    });
    if((r.added||'').trim()){
      L.push('### Missing criteria to add');
      r.added.split('\n').map(function(x){return x.trim();}).filter(Boolean).forEach(function(x){ L.push('- '+x); });
      L.push('');
    }
    if((r.note||'').trim()){ L.push('### Note'); L.push(r.note.trim()); L.push(''); }

    var title = 'Calibrate: ' + m.id + '/' + s.id;
    var url = 'https://github.com/' + REPO + '/issues/new?labels=' + encodeURIComponent('calibration')
      + '&title=' + encodeURIComponent(title)
      + '&body=' + encodeURIComponent(L.join('\n'));
    window.open(url, '_blank', 'noopener');
  }

  function route(){
    var h = location.hash.replace(/^#/,'');
    if(!h){ home(); window.scrollTo(0,0); return; }
    var parts = h.split('/');
    var m = findMethod(parts[0]);
    if(m && parts[1]){ var s = findStage(m, parts[1]); if(s){ stage(m,s); window.scrollTo(0,0); return; } }
    if(m){ method(m); window.scrollTo(0,0); return; }
    home(); window.scrollTo(0,0);
  }
  window.addEventListener('hashchange', route);
  route();
  </script>
</body>
</html>
